<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="google-site-verification" content="t3oa7JWYJOSMJRcteH1VvXyAH8StzV9LbIaCct_0cPY" />
  <title id="pageTitle">Digital Business Card — Taplink</title>
  <meta name="description" id="pageDesc" content="View this digital business card on Taplink." />

  <!-- ✅ DNS preconnect — resolves domain before JS even runs -->
  <link rel="preconnect" href="https://cubscjzhnwhmmqtpzmfu.supabase.co" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

  <!-- ✅ Preload Critical Assets to run them in parallel immediately -->
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.2/dist/umd/supabase.js" as="script" />
  <link rel="modulepreload" href="js/profile.js" />
  <link rel="modulepreload" href="js/main.js" />
  <link rel="modulepreload" href="js/supabase-client.js" />

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/profile.css" />

  <!-- ✅ Inline skeleton styles — renders before any CSS/JS loads -->
  <style>
    .profile-skeleton {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 0;
      background: var(--clr-bg, #030d06);
    }
    .skeleton-cover {
      width: 100%;
      max-width: 480px;
      height: 160px;
      background: linear-gradient(90deg, #0d3a1a 25%, #113f1e 50%, #0d3a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 0 0 24px 24px;
    }
    .skeleton-avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(90deg, #0d3a1a 25%, #113f1e 50%, #0d3a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      margin-top: -44px;
      border: 3px solid #030d06;
    }
    .skeleton-line {
      border-radius: 8px;
      background: linear-gradient(90deg, #0d3a1a 25%, #113f1e 50%, #0d3a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      margin: 10px auto 0;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
<div class="noise-overlay"></div>

<!-- ✅ Skeleton shown immediately while JS fetches the card data -->
<div id="profileRoot">
  <div class="profile-skeleton">
    <div class="skeleton-cover"></div>
    <div class="skeleton-avatar"></div>
    <div class="skeleton-line" style="width:140px;height:18px;margin-top:16px"></div>
    <div class="skeleton-line" style="width:100px;height:13px;margin-top:8px"></div>
    <div class="skeleton-line" style="width:80px;height:13px;margin-top:6px"></div>
    <div class="skeleton-line" style="width:240px;height:44px;margin-top:24px;border-radius:12px"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <div class="skeleton-line" style="width:72px;height:36px;margin:0;border-radius:10px"></div>
      <div class="skeleton-line" style="width:72px;height:36px;margin:0;border-radius:10px"></div>
    </div>
  </div>
</div>

<!-- QR Code Modal -->
<div class="qr-modal-overlay" id="qrModal">
  <div class="qr-modal-box">
    <h3>Scan to Connect</h3>
    <p id="qrPersonName">Scan this QR code to open the digital card</p>
    <div class="qr-box" id="qrBoxContainer"></div>
    <div class="qr-modal-actions">
      <button class="btn btn-primary flex-1" id="downloadQrBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </button>
      <button class="btn btn-outline flex-1" id="closeQrBtn">Close</button>
    </div>
  </div>
</div>

<!-- ✅ QR and Supabase scripts deferred so they don't block layout/parsing -->
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.2/dist/umd/supabase.js"></script>
<script type="module" src="js/profile.js"></script>
</body>
</html>
